<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Français pour débutants</title>
<meta name="theme-color" content="#060608">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Francés París">
<meta name="mobile-web-app-capable" content="yes">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{font-size:16px;}
:root{
  --bg:#060608;--w:#ede9e0;--dim:rgba(237,233,224,0.38);--dimmer:rgba(237,233,224,0.16);
  --gold:#c8a96e;--blue:#7eb3f7;--green:#7ecf9e;
  --serif:Georgia,serif;--mono:'Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
}
body{background:var(--bg);font-family:var(--sans);color:var(--w);
  width:100vw;height:100dvh;overflow:hidden;
  user-select:none;-webkit-user-select:none;touch-action:none;cursor:grab;}
body.dragging{cursor:grabbing;}
canvas#stars{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}

/* MAP — the trick: map is a simple div, we use a wrapper for scaling */
#mapWrap{position:fixed;inset:0;overflow:hidden;z-index:1;}
#map{position:absolute;width:3200px;height:3200px;top:0;left:0;transform-origin:top left;}
#lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}

/* NODES */
.node{position:absolute;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;cursor:pointer;
  transform:translate(-50%,-50%);border:1px solid rgba(237,233,224,0.3);
  background:#000;-webkit-tap-highlight-color:transparent;
  transition:border-color .18s,background .18s;}
.node:hover,.node:active{border-color:rgba(237,233,224,0.7);background:rgba(237,233,224,0.06);}
.node.active{border-color:rgba(237,233,224,0.85);background:rgba(237,233,224,0.08);}
.nc{width:118px;height:118px;border-width:1.5px;border-color:rgba(237,233,224,0.6);}
.ns{width:76px;height:76px;border-color:rgba(237,233,224,0.32);}
.na{width:76px;height:76px;border-color:rgba(237,233,224,0.32);}

.ne{width:76px;height:76px;border-color:rgba(237,233,224,0.32);}

.ne.active{border-color:rgba(237,233,224,.7);}
.nq{width:76px;height:76px;border-color:rgba(237,233,224,0.32);}

.nq.active{border-color:rgba(237,233,224,.7);}
.nv{width:68px;height:68px;}
.nadd{width:60px;height:60px;border-style:dashed;border-color:rgba(237,233,224,0.18);background:transparent;}
.nadd:hover,.nadd:active{border-color:rgba(237,233,224,0.45);}
.ng{width:76px;height:76px;border-color:rgba(237,233,224,0.32);}

.ng.active{border-color:rgba(237,233,224,.7);}
.nlbl{font-size:9px;letter-spacing:.04em;text-transform:uppercase;font-weight:600;
  color:rgba(237,233,224,.7);padding:0 4px;line-height:1.4;pointer-events:none;}
.nc .nlbl{font-size:10px;color:rgba(237,233,224,.88);}
.ne .nlbl{color:rgba(126,179,247,.85);}
.nq .nlbl{color:rgba(200,169,110,.85);}
.node-inp{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:115%;font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:.04em;
  text-transform:uppercase;background:rgba(6,6,8,.96);
  border:1px solid rgba(237,233,224,.4);border-radius:4px;
  color:var(--w);padding:3px 5px;outline:none;text-align:center;z-index:10;}

/* PANEL */
#panel{position:fixed;right:0;top:0;bottom:0;width:min(460px,100vw);
  background:#07090f;border-left:1px solid rgba(237,233,224,0.07);
  transform:translateX(100%);transition:transform .28s ease;z-index:400;
  display:flex;flex-direction:column;}
#panel.open{transform:translateX(0);}
.ph{padding:1rem 1.1rem .7rem;border-bottom:1px solid rgba(237,233,224,0.06);
  display:flex;align-items:flex-start;gap:.6rem;flex-shrink:0;}
.pht{font-family:var(--serif);font-size:1.1rem;line-height:1.2;cursor:pointer;}
.pht:hover{color:var(--gold);}
.pht-inp{font-family:var(--serif);font-size:1.1rem;background:rgba(237,233,224,.06);
  border:1px solid rgba(237,233,224,.25);border-radius:4px;color:var(--w);
  padding:2px 7px;outline:none;min-width:200px;}
.phs{font-size:.66rem;color:var(--dim);margin-top:.15rem;}
.phx{margin-left:auto;background:none;border:none;color:var(--dim);font-size:1.3rem;
  cursor:pointer;min-width:40px;min-height:40px;display:flex;align-items:center;
  justify-content:center;-webkit-tap-highlight-color:transparent;}
.pb{flex:1;overflow-y:auto;padding:.85rem 1.1rem 2rem;-webkit-overflow-scrolling:touch;}

/* CONVERSATION BUBBLES */
.xch{margin-bottom:1rem;}
.xn{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);
  margin-bottom:.32rem;font-family:var(--mono);}
.bub{border-radius:14px;padding:.58rem .78rem;margin-bottom:.28rem;
  border:1px solid rgba(237,233,224,0.07);cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:background .15s,border-color .15s;}
.bub:hover,.bub:active{background:rgba(237,233,224,0.04);border-color:rgba(237,233,224,.14);}
.them{border-top-left-radius:3px;margin-right:1.3rem;}
.me{border-top-right-radius:3px;margin-left:1.3rem;background:rgba(237,233,224,.025);}
.bwho{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  margin-bottom:.2rem;opacity:.34;}
.bes{font-size:.68rem;color:var(--dim);font-style:italic;margin-bottom:.15rem;}
.bfr{font-size:.86rem;font-weight:500;color:var(--w);margin-bottom:.13rem;line-height:1.36;}
.bpr{font-family:var(--mono);font-size:.6rem;color:var(--dimmer);}

/* ADD BUTTON */
.add-btn{display:flex;align-items:center;justify-content:center;margin:.5rem 0 .35rem;
  padding:.52rem;border:1px dashed rgba(237,233,224,.16);border-radius:10px;
  background:transparent;color:var(--dim);font-family:var(--sans);
  font-size:.66rem;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:all .16s;width:100%;}
.add-btn:hover,.add-btn:active{border-color:rgba(237,233,224,.36);color:var(--w);}

/* OVERLAY */
#ov{position:fixed;inset:0;z-index:600;background:rgba(4,5,8,.94);
  display:flex;align-items:center;justify-content:center;padding:1rem;
  opacity:0;pointer-events:none;transition:opacity .2s;}
#ov.on{opacity:1;pointer-events:all;}
.fc{background:#0a0d14;border:1px solid rgba(237,233,224,.1);border-radius:16px;
  width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:1.25rem;
  -webkit-overflow-scrolling:touch;}
.fc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.85rem;}
.tabs{display:flex;gap:.26rem;flex-wrap:wrap;}
.tb{font-family:var(--sans);font-size:.58rem;letter-spacing:.07em;text-transform:uppercase;
  padding:.24rem .58rem;border-radius:5px;cursor:pointer;
  border:1px solid rgba(237,233,224,.1);background:transparent;color:var(--dim);
  transition:all .14s;-webkit-tap-highlight-color:transparent;}
.tb.on{background:rgba(237,233,224,.08);border-color:rgba(237,233,224,.24);color:var(--w);}
.fcx{background:rgba(237,233,224,.05);border:1px solid rgba(237,233,224,.1);color:var(--dim);
  font-size:.8rem;padding:.22rem .52rem;border-radius:5px;cursor:pointer;font-family:var(--sans);}

/* FOCUS OVERLAY CONTENT */
.fw{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dimmer);margin-bottom:.48rem;}
.ffr{font-family:var(--serif);font-size:1.25rem;line-height:1.3;margin-bottom:.36rem;}
.fes{font-size:.82rem;color:var(--dim);font-style:italic;margin-bottom:.33rem;}
.fpr{font-family:var(--mono);font-size:.92rem;color:rgba(237,233,224,.6);margin-bottom:.95rem;letter-spacing:.02em;}
.hdiv{height:1px;background:rgba(237,233,224,.07);margin:.8rem 0;}
.glbl{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);opacity:.72;margin-bottom:.55rem;}
.gi{background:rgba(237,233,224,.03);border-radius:9px;padding:.65rem .82rem;
  margin-bottom:.48rem;border-left:2px solid rgba(126,179,247,.3);}
.gi-l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:.22rem;font-weight:600;}
.gi-t{font-size:.75rem;color:rgba(237,233,224,.7);line-height:1.5;}
.gi-ex{margin-top:.35rem;font-family:var(--mono);font-size:.66rem;color:rgba(200,169,110,.55);
  background:rgba(200,169,110,.06);padding:.2rem .45rem;border-radius:3px;display:inline-block;}
.wlink{cursor:pointer;border-bottom:1px dashed rgba(237,233,224,.2);}
.wlink:hover{color:var(--gold);border-bottom-color:var(--gold);}
.wback{font-family:var(--sans);font-size:.56rem;letter-spacing:.08em;text-transform:uppercase;
  background:transparent;border:1px solid rgba(237,233,224,.1);color:var(--dim);
  padding:.22rem .52rem;border-radius:4px;cursor:pointer;margin-bottom:.75rem;display:inline-block;}

/* FORM ELEMENTS */
.flbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);
  margin-bottom:.22rem;margin-top:.6rem;display:block;}
.flbl:first-of-type{margin-top:0;}
.inp{width:100%;background:rgba(237,233,224,.04);border:1px solid rgba(237,233,224,.1);
  border-radius:7px;color:var(--w);font-family:var(--sans);font-size:.84rem;
  padding:.48rem .65rem;outline:none;transition:border-color .14s;}
.inp:focus{border-color:rgba(237,233,224,.26);}
textarea.inp{resize:vertical;}
.rbtn{display:flex;gap:.38rem;margin-top:.8rem;flex-wrap:wrap;}
.btn{padding:.48rem .82rem;border-radius:6px;cursor:pointer;font-family:var(--sans);
  font-size:.65rem;letter-spacing:.07em;text-transform:uppercase;transition:all .14s;
  -webkit-tap-highlight-color:transparent;border:none;}
.bp{flex:1;background:rgba(237,233,224,.08);border:1px solid rgba(237,233,224,.2);color:var(--w);}
.bp:hover,.bp:active{background:rgba(237,233,224,.14);}
.bs{background:transparent;border:1px solid rgba(237,233,224,.08);color:var(--dim);}
.bs:hover,.bs:active{color:var(--w);}
.bai{background:rgba(126,179,247,.1);border:1px solid rgba(126,179,247,.28);color:var(--blue);}
.bai:hover,.bai:active{background:rgba(126,179,247,.18);}
.bgreen{background:rgba(126,207,158,.1);border:1px solid rgba(126,207,158,.28);color:var(--green);}
.bgreen:hover,.bgreen:active{background:rgba(126,207,158,.18);}
.stat{font-size:.65rem;text-align:center;padding:.3rem 0;display:none;font-family:var(--sans);}
.stat.b{color:rgba(126,179,247,.8);}
.stat.r{color:rgba(240,100,100,.8);}
.stat.g{color:rgba(126,207,158,.8);}
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(237,233,224,.12);
  border-top-color:rgba(126,179,247,.8);border-radius:50%;
  animation:sp .65s linear infinite;vertical-align:middle;margin-right:.3rem;}
@keyframes sp{to{transform:rotate(360deg)}}

/* VERBS */
.vs{margin-bottom:1rem;}
.vsh{font-family:var(--serif);font-size:.95rem;cursor:pointer;padding:.15rem 0;}
.vsh:hover,.vsh:active{color:var(--gold);}
.vssub{font-size:.64rem;color:var(--dim);font-style:italic;margin-bottom:.52rem;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:.22rem;margin-bottom:.42rem;}
.cr{background:rgba(237,233,224,.03);border-radius:6px;padding:.3rem .5rem;
  display:flex;justify-content:space-between;}
.cp{font-size:.64rem;color:var(--dim);}
.cf{font-family:var(--mono);font-size:.68rem;color:var(--w);}
.rb{background:rgba(126,179,247,.05);border-radius:7px;padding:.5rem .65rem;
  border-left:2px solid rgba(126,179,247,.25);font-size:.7rem;color:rgba(237,233,224,.62);line-height:1.46;}
.rb code{font-family:var(--mono);color:var(--gold);background:rgba(200,169,110,.08);padding:.02rem .24rem;border-radius:3px;}
.vexs{flex-direction:column;gap:.22rem;margin-top:.42rem;}
.vex{background:rgba(237,233,224,.03);border-radius:6px;padding:.35rem .52rem;
  font-size:.72rem;color:rgba(237,233,224,.55);border-left:2px solid rgba(237,233,224,.1);}
.vex em{display:block;font-style:normal;color:rgba(237,233,224,.3);font-size:.64rem;margin-top:.1rem;}
.avf{background:rgba(237,233,224,.03);border-radius:10px;padding:.78rem .88rem;
  border:1px solid rgba(237,233,224,.07);margin-top:.4rem;}

/* VOCAB */
.vg{margin-bottom:1.1rem;}
.vgh{display:flex;align-items:center;margin-bottom:.5rem;}
.vgt{font-family:var(--serif);font-size:.92rem;cursor:pointer;}
.vgt:hover{color:var(--gold);}
.vgt-inp{font-family:var(--serif);font-size:.92rem;background:rgba(237,233,224,.06);
  border:1px solid rgba(237,233,224,.22);border-radius:3px;color:var(--w);
  padding:.08rem .38rem;outline:none;}
.vh{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.24rem;
  margin-bottom:.32rem;padding-bottom:.24rem;border-bottom:1px solid rgba(237,233,224,.07);}
.vhl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dimmer);}
.vr{display:grid;grid-template-columns:1fr 1fr 1fr auto auto;gap:.24rem;margin-bottom:.2rem;align-items:center;}
.vspk{background:none;border:none;color:rgba(237,233,224,.35);font-size:.65rem;cursor:pointer;padding:.1rem .2rem;transition:color .15s;}
.vspk:hover{color:var(--w);}
.gspk{background:rgba(237,233,224,.07);border:1px solid rgba(237,233,224,.15);color:rgba(237,233,224,.6);font-size:.62rem;border-radius:5px;padding:.15rem .45rem;cursor:pointer;margin-left:.5rem;vertical-align:middle;}
.gspk:hover{background:rgba(237,233,224,.12);}
.ves{font-size:.7rem;color:var(--dim);font-style:italic;}
.vfr{font-size:.72rem;color:var(--w);font-weight:500;}
.vpr{font-family:var(--mono);font-size:.57rem;color:var(--dimmer);}

/* EXAM */
.echat{display:flex;flex-direction:column;gap:.38rem;margin-bottom:.85rem;}
.emsg{border-radius:12px;padding:.6rem .8rem;max-width:90%;}
.eai{background:rgba(126,179,247,.07);border:1px solid rgba(126,179,247,.14);border-top-left-radius:3px;}
.euser{background:rgba(237,233,224,.05);border:1px solid rgba(237,233,224,.08);
  border-top-right-radius:3px;margin-left:auto;}
.ecorrect{background:rgba(126,207,158,.07);border:1px solid rgba(126,207,158,.18);border-top-left-radius:3px;}
.ewrong{background:rgba(240,130,100,.07);border:1px solid rgba(240,130,100,.16);border-top-left-radius:3px;}
.enote{font-size:.73rem;color:rgba(237,233,224,.65);line-height:1.46;}
.ecorr{font-size:.68rem;font-family:var(--mono);color:var(--green);margin-top:.18rem;}
.einp-row{display:flex;gap:.38rem;margin-top:.45rem;}
.einp{flex:1;background:rgba(237,233,224,.05);border:1px solid rgba(237,233,224,.14);
  border-radius:8px;color:var(--w);font-family:var(--sans);font-size:.84rem;
  padding:.46rem .65rem;outline:none;}
.einp:focus{border-color:rgba(237,233,224,.28);}
.esend{padding:.46rem .8rem;border-radius:7px;cursor:pointer;
  background:rgba(126,179,247,.12);border:1px solid rgba(126,179,247,.3);
  color:var(--blue);font-family:var(--sans);font-size:.65rem;letter-spacing:.06em;
  text-transform:uppercase;transition:all .14s;-webkit-tap-highlight-color:transparent;}
.esend:hover,.esend:active{background:rgba(126,179,247,.2);}
.hintbtn{font-size:.58rem;letter-spacing:.07em;text-transform:uppercase;
  background:transparent;border:1px solid rgba(200,169,110,.22);
  color:rgba(200,169,110,.6);border-radius:4px;padding:.18rem .46rem;
  cursor:pointer;font-family:var(--sans);-webkit-tap-highlight-color:transparent;}
.hintbtn:hover,.hintbtn:active{border-color:rgba(200,169,110,.5);color:var(--gold);}

/* ZOOM CONTROLS */
#zc{position:fixed;bottom:1.3rem;left:1.1rem;z-index:200;display:flex;align-items:center;gap:.35rem;}
.zb{width:28px;height:28px;border-radius:50%;background:rgba(237,233,224,.06);
  border:1px solid rgba(237,233,224,.14);color:rgba(237,233,224,.55);
  font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:all .14s;line-height:1;}
.zb:hover,.zb:active{background:rgba(237,233,224,.12);color:var(--w);}
#zpct{font-size:11px;color:rgba(237,233,224,.28);font-family:var(--mono);min-width:2.6rem;text-align:center;}

/* HUD */
#hud{position:fixed;bottom:1.3rem;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(237,233,224,.16);pointer-events:none;z-index:50;white-space:nowrap;
  animation:fadeout 5s 3s forwards;}
@keyframes fadeout{to{opacity:0}}

/* JUEGOS */
.game-sent{font-family:var(--serif);font-size:1.1rem;color:var(--w);line-height:1.4;margin-bottom:1.1rem;padding:.7rem .9rem;background:rgba(237,233,224,.04);border-radius:10px;border-left:3px solid rgba(126,207,158,.35);}
.game-slots{display:flex;flex-wrap:wrap;gap:.38rem;min-height:2.8rem;padding:.55rem .6rem;background:rgba(237,233,224,.03);border-radius:10px;border:1px dashed rgba(237,233,224,.14);margin-bottom:.85rem;align-items:center;}
.game-slot-ph{font-size:.75rem;color:var(--dimmer);font-style:italic;}
.game-words{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.9rem;}
.gword{padding:.38rem .7rem;border-radius:6px;background:rgba(237,233,224,.07);border:1px solid rgba(237,233,224,.16);font-size:.82rem;color:var(--w);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .14s;user-select:none;-webkit-user-select:none;}
.gword:active,.gword:hover{background:rgba(237,233,224,.14);border-color:rgba(237,233,224,.35);}
.gword.used{opacity:.28;pointer-events:none;}
.gword.placed{background:rgba(126,207,158,.12);border-color:rgba(126,207,158,.35);color:var(--green);}
.gword.placed:active,.gword.placed:hover{background:rgba(126,207,158,.2);}
.game-result{border-radius:10px;padding:.7rem .85rem;margin-bottom:.7rem;font-size:.82rem;line-height:1.5;}
.game-ok{background:rgba(126,207,158,.08);border:1px solid rgba(126,207,158,.25);color:var(--green);}
.game-fail{background:rgba(240,130,100,.07);border:1px solid rgba(240,130,100,.2);color:rgba(240,160,130,.9);}
.game-score{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dimmer);margin-bottom:.5rem;}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="mapWrap">
<svg id="rings" style="position:absolute;top:0;left:0;width:3200px;height:3200px;pointer-events:none;z-index:0;" xmlns="http://www.w3.org/2000/svg">
<defs><style>.ring{fill:none;stroke:rgba(237,233,224,0.08);stroke-width:1;stroke-dasharray:6 10;}</style></defs>
<circle class="ring" cx="1600" cy="1600" r="80"/>
<circle class="ring" cx="1600" cy="1600" r="160"/>
<circle class="ring" cx="1600" cy="1600" r="240"/>
<circle class="ring" cx="1600" cy="1600" r="320"/>
<circle class="ring" cx="1600" cy="1600" r="400"/>
<circle class="ring" cx="1600" cy="1600" r="480"/>
<circle class="ring" cx="1600" cy="1600" r="560"/>
<circle class="ring" cx="1600" cy="1600" r="640"/>
<circle class="ring" cx="1600" cy="1600" r="720"/>
<circle class="ring" cx="1600" cy="1600" r="800"/>
<circle class="ring" cx="1600" cy="1600" r="880"/>
<circle class="ring" cx="1600" cy="1600" r="960"/>
<circle class="ring" cx="1600" cy="1600" r="1040"/>
<circle class="ring" cx="1600" cy="1600" r="1120"/>
<circle class="ring" cx="1600" cy="1600" r="1200"/>
<circle class="ring" cx="1600" cy="1600" r="1280"/>
<circle class="ring" cx="1600" cy="1600" r="1360"/>
<circle class="ring" cx="1600" cy="1600" r="1440"/>
<circle class="ring" cx="1600" cy="1600" r="1520"/>
<circle class="ring" cx="1600" cy="1600" r="1600"/>
</svg>
<div id="map"><svg id="lines"></svg></div></div>
<div id="panel">
  <div class="ph">
    <div style="flex:1;min-width:0;">
      <div class="pht" id="pT" onclick="editPanelTitle()"></div>
      <div class="phs" id="pS"></div>
    </div>
    <button class="phx" onclick="closePanel()">✕</button>
  </div>
  <div class="pb" id="pB"></div>
</div>
<div id="ov"><div class="fc" id="fc"></div></div>
<div id="zc">
  <button class="zb" onclick="doZoom(0.8)">−</button>
  <span id="zpct">100%</span>

function mkLine(x1,y1,x2,y2,op){

// ══════════════════════════ BUILD MAP ══════════════════════════
function buildMap(){
  var mapEl=document.getElementById('map');
  var svgEl=document.getElementById('lines');
  Array.from(mapEl.querySelectorAll('.node')).forEach(function(n){n.remove();});
  while(svgEl.firstChild)svgEl.removeChild(svgEl.firstChild);

  function mkNode(cls,id,x,y,labelHtml,fn,dblFn){
    var d=document.createElement('div');
    d.className='node '+cls;
    if(id)d.id=id;
    d.style.left=x+'px';d.style.top=y+'px';
    d.innerHTML=labelHtml;
    if(fn)d.addEventListener('click',fn);
    if(dblFn)d.addEventListener('dblclick',function(e){e.stopPropagation();dblFn();});
    mapEl.appendChild(d);
    return d;
  }

  // CENTER
  mkNode('nc','',CX,CY,'<span class="nlbl" id="cntrLbl">Français<br>pour<br>vagos</span>',null,startCenterEdit);

  // INNER RING — 5 nodes
  // Top-left: Examen, Top-center: Juegos, Top-right: Preguntas
  // Bottom-left: Verbos, Bottom-right: Vocabulario
  var RS=172, angOff=0.62;
  var innerNodes=[
    {cls:'ne',id:'sn-exam', x:CX-RS*Math.sin(angOff), y:CY-RS*Math.cos(angOff), lbl:'Palabra',     fn:openExamPanel},
    {cls:'ng',id:'sn-game', x:CX,                      y:CY-RS,                  lbl:'Juegos',       fn:openGamePanel},
    {cls:'nq',id:'sn-qa',   x:CX+RS*Math.sin(angOff), y:CY-RS*Math.cos(angOff), lbl:'Dudas',      fn:openQAPanel},
    {cls:'ns',id:'sn-verbs',x:CX-RS*Math.sin(angOff), y:CY+RS*Math.cos(angOff), lbl:'Verbos',      fn:openVerbPanel},
    {cls:'na',id:'sn-audio',x:CX,                      y:CY+RS,                  lbl:'Gramática',    fn:openAudioPanel},
    {cls:'ns',id:'sn-vocab',x:CX+RS*Math.sin(angOff), y:CY+RS*Math.cos(angOff), lbl:'Vocabulario', fn:openVocabPanel}
  ];
  innerNodes.forEach(function(s){
    svgEl.appendChild(mkLine(CX,CY,s.x,s.y,0.18));
    mkNode(s.cls,s.id,s.x,s.y,'<span class="nlbl">'+s.lbl+'</span>',s.fn,null);
  });

  // OUTER ARC — conversations, max 20 per ring, overflow goes to second ring
  var MAX_PER_RING=20;
  var ring1=CLOUDS.slice(0,MAX_PER_RING);
  var ring2=CLOUDS.slice(MAX_PER_RING);
  var arcSpan=Math.PI*0.56;

  function placeRing(clouds,RC,offset){
    var n=clouds.length;
    var lc=Math.floor(n/2), rc=n-lc;
    for(var i=0;i<lc;i++){
      var t=lc>1?i/(lc-1):0.5;
      var ang=Math.PI-arcSpan/2+arcSpan*t;
      var x=CX+RC*Math.cos(ang), y=CY+RC*Math.sin(ang);
      svgEl.appendChild(mkLine(CX,CY,x,y,0.1));
      mkNode('nv','cn'+(offset+i),x,y,'<span class="nlbl">'+clouds[i].title+'</span>',
        (function(ii){return function(){openCloudPanel(ii);};})(offset+i),null);
    }
    for(var i=0;i<rc;i++){
      var idx=lc+i;
      var t=rc>1?i/(rc-1):0.5;
      var ang=-arcSpan/2+arcSpan*t;
      var x=CX+RC*Math.cos(ang), y=CY+RC*Math.sin(ang);
      svgEl.appendChild(mkLine(CX,CY,x,y,0.1));
      mkNode('nv','cn'+(offset+idx),x,y,'<span class="nlbl">'+clouds[idx].title+'</span>',
        (function(ii){return function(){openCloudPanel(ii);};})(offset+idx),null);
    }
  }

  var RC=370;
  placeRing(ring1,RC,0);
  if(ring2.length) placeRing(ring2,RC+130,MAX_PER_RING);

  // ADD node — bottom center
  mkNode('nadd','',CX,CY+RC+5,'<span style="font-size:18px;color:rgba(237,233,224,.35);font-weight:200;line-height:1;pointer-events:none;">+</span>',openAddConv,null);
}

// ══════════════════════════ PAN + ZOOM ══════════════════════════
var tx=0,ty=0,sc_z=1;
var SMIN=0.3,SMAX=2.5;
var dragging=false,dsx=0,dsy=0,psx=0,psy=0;
var lastPinch=null;

function clamp(){
  // Keep at least 200px of map visible on each side
  var mw=3200*sc_z, mh=3200*sc_z;
  var sw=window.innerWidth, sh=window.innerHeight;
  tx=Math.max(sw-mw-100,Math.min(100,tx));
  ty=Math.max(sh-mh-100,Math.min(100,ty));
}

function applyT(){
  var m=document.getElementById('map');
  m.style.transformOrigin='0 0';
  m.style.transform='translate('+tx+'px,'+ty+'px) scale('+sc_z+')';
  var rings=document.getElementById('rings');
  if(rings){rings.style.transformOrigin='0 0';rings.style.transform='translate('+tx+'px,'+ty+'px) scale('+sc_z+')';}
  var el=document.getElementById('zpct');
  if(el)el.textContent=Math.round(sc_z*100)+'%';
}

function initCenter(){
  sc_z=1;
  tx=Math.round(-(CX-window.innerWidth/2));
  ty=Math.round(-(CY-window.innerHeight/2));
  applyT();
}

function doZoom(factor,px,py){
  if(px===undefined){px=window.innerWidth/2;py=window.innerHeight/2;}
  var ns=Math.max(SMIN,Math.min(SMAX,sc_z*factor));
  // zoom around point (px,py)
  var mx=(px-tx)/sc_z, my=(py-ty)/sc_z;
  sc_z=ns;
  tx=px-mx*sc_z;
  ty=py-my*sc_z;
  clamp();applyT();
}

// Wheel
document.addEventListener('wheel',function(e){
  if(e.target.closest('#panel')||e.target.closest('#ov'))return;
  e.preventDefault();
  doZoom(e.deltaY<0?1.1:0.91,e.clientX,e.clientY);
},{passive:false});

// Mouse drag
document.addEventListener('mousedown',function(e){
  if(e.target.closest('#panel')||e.target.closest('.node')||e.target.closest('#ov')||e.target.closest('#zc'))return;
  dragging=true;dsx=e.clientX;dsy=e.clientY;psx=tx;psy=ty;
  document.body.classList.add('dragging');
});
document.addEventListener('mousemove',function(e){
  if(!dragging)return;
  tx=psx+(e.clientX-dsx);ty=psy+(e.clientY-dsy);
  clamp();applyT();
});
document.addEventListener('mouseup',function(){dragging=false;document.body.classList.remove('dragging');});

// Touch
document.addEventListener('touchstart',function(e){
  if(e.target.closest('#panel')||e.target.closest('#ov'))return;
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    lastPinch=Math.sqrt(dx*dx+dy*dy);
    dragging=false;
  } else if(!e.target.closest('.node')){
    lastPinch=null;
    dragging=true;
    var t=e.touches[0];dsx=t.clientX;dsy=t.clientY;psx=tx;psy=ty;
  }
},{passive:true});

document.addEventListener('touchmove',function(e){
  if(e.target.closest('#panel')||e.target.closest('#ov'))return;
  if(e.touches.length===2&&lastPinch!==null){
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    var d=Math.sqrt(dx*dx+dy*dy);
    var cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    var cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    doZoom(d/lastPinch,cx,cy);
    lastPinch=d;
    e.preventDefault();
  } else if(dragging&&e.touches.length===1){
    var t=e.touches[0];
    tx=psx+(t.clientX-dsx);ty=psy+(t.clientY-dsy);
    clamp();applyT();
    e.preventDefault();
  }
},{passive:false});

document.addEventListener('touchend',function(e){
  if(e.touches.length<2)lastPinch=null;
  if(e.touches.length===0)dragging=false;
});

window.addEventListener('resize',function(){clamp();applyT();});

async function addExchangeAI(ci){
  var idea=(document.getElementById('aeIdea')||{value:''}).value.trim();if(!idea)return;

  if(stat){stat.className='stat b';stat.style.display='block';stat.innerHTML='<span class="spin"></span>Generando...';}

    var ctx=c.exchanges.map(function(ex,idx){return(idx+1)+'. Ellos: '+ex.them.es+' / Tú: '+ex.me.es;}).join(' | ');
    var r=await apiFetch('Conversación "'+c.title+'" en París. Contexto: '+ctx+'. Añade UN intercambio natural sobre: "'+idea+'". Estudiante española principiante. SOLO JSON: {"them":{"es":"","fr":"","pr":"pronunciación española"},"me":{"es":"","fr":"","pr":"pronunciación española"}}',350);

  }catch(e){
    if(stat){stat.className='stat r';stat.textContent='Error: '+e.message;}
    if(btn)btn.disabled=false;

async function saveAI(){
  var ci=focusCtx.ci,ei=focusCtx.ei,who=focusCtx.who;
  var newEs=(document.getElementById('editEs')||{value:''}).value.trim();if(!newEs)return;
  var stat=document.getElementById('estat'),btn=document.getElementById('eAIBtn');
  if(stat){stat.className='stat b';stat.style.display='block';stat.innerHTML='<span class="spin"></span>Regenerando...';}
  if(btn)btn.disabled=true;
  try{
    var cloud=CLOUDS[ci];
    // Exchanges BEFORE the edited one stay as-is (already confirmed by user)
    var before=cloud.exchanges.slice(0,ei).map(function(ex,idx){
      return'Intercambio '+(idx+1)+' (ya confirmado): Ellos: "'+ex.them.fr+'" / Tú: "'+ex.me.fr+'"';
    }).join(' | ');
    // Exchanges FROM the edited one onwards will be regenerated
    var fromHere=cloud.exchanges.slice(ei).map(function(ex,idx){
      return'Intercambio '+(ei+idx+1)+': Ellos: '+ex.them.es+' / Tú: '+ex.me.es;
    }).join(' | ');
    var count=cloud.exchanges.length-ei;
    var prompt='Conversación "'+cloud.title+'". Bar París. Estudiante española Erasmus.\n'+
      (before?'Intercambios anteriores ya fijados (NO los cambies): '+before+'\n':'')+
      'Cambia el intercambio '+(ei+1)+', '+(who==='them'?'Ellos':'Tú')+' a: "'+newEs+'". '+
      'Regenera de forma coherente SOLO los '+count+' intercambios desde el '+(ei+1)+' en adelante. '+
      'CRÍTICO: "pr" = pronunciación fonética en español. Ej: "bon-shur", "si-vú-plé", "me-rsi". NUNCA inglés. '+
      'SOLO JSON con exactamente '+count+' intercambios: {"exchanges":[{"them":{"es":"","fr":"","pr":""},"me":{"es":"","fr":"","pr":""}}]}';
    var r=await apiFetch(prompt,2000);
    if(r.exchanges){
      r.exchanges.forEach(function(ex,idx){
        var realIdx=ei+idx;
        if(realIdx<cloud.exchanges.length){
          if(ex.them)Object.assign(cloud.exchanges[realIdx].them,ex.them);
          if(ex.me)Object.assign(cloud.exchanges[realIdx].me,ex.me);
        }
      });
    }
    closeOv();renderCloud(ci);
  }catch(e){
    if(stat){stat.className='stat r';stat.textContent='Error: '+e.message;}
    if(btn)btn.disabled=false;
  }
}

// ══ AUDIO — Web Speech API ══
var _frVoice=null;
function _loadFrVoice(){
  var vs=window.speechSynthesis?window.speechSynthesis.getVoices():[];
  _frVoice=vs.find(function(v){return v.lang==='fr-FR';})||
            vs.find(function(v){return v.lang.startsWith('fr');})||null;
}
if(window.speechSynthesis){
  _loadFrVoice();
  window.speechSynthesis.onvoiceschanged=_loadFrVoice;
}
function speakFr(text){
  if(!window.speechSynthesis){alert('Tu navegador no soporta síntesis de voz.');return;}
  // iOS workaround: resume if suspended
  if(window.speechSynthesis.paused)window.speechSynthesis.resume();
  window.speechSynthesis.cancel();
  _loadFrVoice();
  var u=new SpeechSynthesisUtterance(text);
  u.lang='fr-FR';u.rate=0.82;u.pitch=1;u.volume=1;
  if(_frVoice)u.voice=_frVoice;
  // iOS needs a tiny delay after cancel
  setTimeout(function(){window.speechSynthesis.speak(u);},50);
}

function startGame(){
  // Pick a random exchange from CLOUDS — max 15 words
  var allPhrases=[];
  CLOUDS.forEach(function(c){
    c.exchanges.forEach(function(ex){
      allPhrases.push({es:ex.them.es,fr:ex.them.fr});
      allPhrases.push({es:ex.me.es,fr:ex.me.fr});
    });
  });
  // Filter to phrases with ≤15 words
  var short=allPhrases.filter(function(p){
    return p.fr.replace(/[?!¿¡.,;:]/g,'').trim().split(/\s+/).length<=15;
  });
  var pool=short.length?short:allPhrases;
  var ph=pool[Math.floor(Math.random()*pool.length)];
  var target=ph.fr.replace(/[?!¿¡.,;:]/g,'').trim();
  var correct=target.split(/\s+/).filter(function(w){return w.length>0;});
  // Add distractor words from other phrases
  var distractors=[];
  allPhrases.forEach(function(p){
    if(p.fr!==ph.fr){
      p.fr.replace(/[?!¿¡.,;:]/g,'').split(/\s+/).forEach(function(w){
        if(w.length>1&&correct.indexOf(w)<0&&distractors.indexOf(w)<0)distractors.push(w);
      });
    }
  });
  // Shuffle distractors, take 3-4
  distractors=distractors.sort(function(){return Math.random()-.5;}).slice(0,4);
  var words=correct.concat(distractors).sort(function(){return Math.random()-.5;});
  gameState={
    sentence:ph.es,
    target:ph.fr,
    correct:correct,
    words:words,
    placed:[],
    usedIdx:[],
    result:null,
    streak:gameState?gameState.streak:0
  };
  renderGamePanel();
}

function placeWord(wi){
  if(!gameState||gameState.result)return;
  if(gameState.usedIdx.indexOf(wi)>=0)return;
  gameState.placed.push(gameState.words[wi]);
  gameState.usedIdx.push(wi);
  renderGamePanel();
}

function removeWord(pi){
  if(!gameState||gameState.result)return;
  // Find which word index this placed word came from
  var w=gameState.placed[pi];
  // Find first unused matching index
  for(var i=0;i<gameState.words.length;i++){
    if(gameState.words[i]===w&&gameState.usedIdx.indexOf(i)>=0){
      gameState.usedIdx.splice(gameState.usedIdx.indexOf(i),1);
      break;
    }
  }
  gameState.placed.splice(pi,1);
  renderGamePanel();
}

function showGameHint(){
  if(!gameState||gameState.result)return;
  var first=gameState.correct[0]||'';
  var hint='La frase empieza por: <b style="color:var(--w);">'+first+'…</b> y tiene '+gameState.correct.length+' palabras.';
  var hd=document.getElementById('game-hint');
  if(hd){hd.innerHTML=hint;hd.style.display='block';}
}

function checkGame(){
  if(!gameState)return;
  var answer=gameState.placed.join(' ');
  var target=gameState.correct.join(' ');
  function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/['']/g,"'");}
  if(norm(answer)===norm(target)){
    gameState.result='ok';
    gameState.streak++;
    speakFr(gameState.target);
  } else {
    gameState.result='fail';
    gameState.streak=0;
    gameState.explain='Escribiste: "'+gameState.placed.join(' ')+'" — Correcto: "'+gameState.target+'"';
    // Add to failed phrases (avoid duplicates)
    var already=failedPhrases.some(function(p){return p.fr===gameState.target;});
    if(!already)failedPhrases.push({es:gameState.sentence,fr:gameState.target});
  }
  renderGamePanel();
}

function startGameFailed(){
  if(!failedPhrases.length)return;
  var ph=failedPhrases[Math.floor(Math.random()*failedPhrases.length)];
  var target=ph.fr.replace(/[?!¿¡.,;:]/g,'').trim();
  var correct=target.split(/\s+/).filter(function(w){return w.length>0;});
  var allPhrases=[];
  CLOUDS.forEach(function(c){c.exchanges.forEach(function(ex){
    allPhrases.push(ex.them.fr);allPhrases.push(ex.me.fr);
  });});
  var distractors=[];
  allPhrases.forEach(function(fr){
    if(fr!==ph.fr){
      fr.replace(/[?!¿¡.,;:]/g,'').split(/\s+/).forEach(function(w){
        if(w.length>1&&correct.indexOf(w)<0&&distractors.indexOf(w)<0)distractors.push(w);
      });
    }
  });
  distractors=distractors.sort(function(){return Math.random()-.5;}).slice(0,4);
  var words=correct.concat(distractors).sort(function(){return Math.random()-.5;});
  gameState={sentence:ph.es,target:ph.fr,correct:correct,words:words,placed:[],usedIdx:[],result:null,streak:gameState?gameState.streak:0};
  renderGamePanel();
}

async function sendQA(){
  var inp=document.getElementById('qaInp');if(!inp)return;
  var word=inp.value.trim();if(!word)return;
  var stat=document.getElementById('qastat'),btn=document.getElementById('qaBtn');
  if(stat){stat.className='stat b';stat.style.display='block';stat.innerHTML='<span class="spin"></span>Buscando...';}
  if(btn)btn.disabled=true;
  try{
    var r=await apiFetch(
      'Explica la palabra francesa "'+word+'" para una estudiante española principiante. '+
      'SOLO JSON: {"word":"'+word+'","type":"categoría gramatical en español (preposición, adverbio, etc.)","translation":"traducción al español","pronunciation":"pronunciación fonética en español (ej: daaN)","definition":"explicación breve en español de cuándo y cómo se usa (max 2 frases)","examples":[{"fr":"frase en francés","es":"traducción"},{"fr":"frase en francés","es":"traducción"}]}',
      400);
    r.word=r.word||word;
    // Remove duplicates by word
    qaLog=qaLog.filter(function(e){return e.word.toLowerCase()!==r.word.toLowerCase();});
    qaLog.push(r);
    inp.value='';
    if(stat)stat.style.display='none';
    renderQAPanel();
    if(typeof saveAll==='function')saveAll();
  }catch(e){
    if(stat){stat.className='stat r';stat.textContent='Error: '+e.message;}
    if(btn)btn.disabled=false;
  }
}

// ══ PALABRA DEL DÍA (WORDLE) ══
var wordleState=null; // {word, hint, guesses[], won, lost, maxGuesses}

function openExamPanel(){
  activateNode('sn-exam');
  curPanel='exam';
  if(!wordleState||wordleState.done)wordleState=null;
  renderExamPanel();
}

function renderExamPanel(){
  if(!wordleState){
    setSide('Palabra del día','Adivina la palabra francesa',
      '<div style="font-size:.78rem;color:var(--dim);margin-bottom:1rem;line-height:1.55;">'+
      'La IA elige una palabra francesa. Tienes 6 intentos para adivinarla letra a letra — como el Wordle.</div>'+
      '<div class="rbtn"><button class="btn bgreen" onclick="startWordle()">Nueva palabra</button></div>',false);
    return;
  }
  var ws=wordleState;
  var word=ws.word.toUpperCase();
  var len=word.length;

  // Render guesses grid
  var gridH='<div style="display:flex;flex-direction:column;gap:.3rem;align-items:center;margin:.75rem 0;">';
  for(var r=0;r<ws.maxGuesses;r++){
    gridH+='<div style="display:flex;gap:.3rem;">';
    var guess=(ws.guesses[r]||'').toUpperCase();
    for(var c=0;c<len;c++){
      var ch=guess[c]||'';
      var bg='rgba(237,233,224,.06)';var bc='rgba(237,233,224,.15)';var col='rgba(237,233,224,.4)';
      if(ch){
        if(word[c]===ch){bg='rgba(126,207,158,.25)';bc='rgba(126,207,158,.5)';col='var(--w)';}
        else if(word.indexOf(ch)>=0){bg='rgba(200,169,110,.2)';bc='rgba(200,169,110,.45)';col='var(--w)';}
        else{bg='rgba(237,233,224,.04)';bc='rgba(237,233,224,.08)';col='rgba(237,233,224,.25)';}
      }
      gridH+='<div style="width:32px;height:32px;border:1px solid '+bc+';background:'+bg+';border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:600;color:'+col+';font-family:var(--mono);">'+ch+'</div>';
    }
    gridH+='</div>';
  }
  gridH+='</div>';

  // Legend
  var legendH='<div style="display:flex;gap:.6rem;justify-content:center;font-size:.6rem;color:var(--dim);margin-bottom:.6rem;">'+
    '<span><span style="color:rgba(126,207,158,.8);">■</span> Posición correcta</span>'+
    '<span><span style="color:rgba(200,169,110,.8);">■</span> Letra en otra posición</span>'+
    '<span><span style="color:rgba(237,233,224,.2);">■</span> No está</span>'+
  '</div>';

  var status='';
  if(ws.won){
    status='<div style="text-align:center;padding:.6rem;background:rgba(126,207,158,.1);border-radius:8px;margin:.5rem 0;">'+
      '<div style="font-size:.85rem;color:rgba(126,207,158,.9);">✓ ¡Correcto!</div>'+
      '<div style="font-size:.7rem;color:var(--dim);margin-top:.2rem;">La palabra era: <b style="color:var(--w);">'+ws.word+'</b> — '+ws.translation+'</div>'+
      '<button class="gspk" style="margin-top:.4rem;" onclick="speakFr(\''+ws.word+'\')">▶ Escuchar</button>'+
    '</div>';
  } else if(ws.lost){
    status='<div style="text-align:center;padding:.6rem;background:rgba(255,80,60,.06);border-radius:8px;margin:.5rem 0;">'+
      '<div style="font-size:.75rem;color:rgba(255,120,100,.8);">La palabra era: <b style="color:var(--w);">'+ws.word+'</b> — '+ws.translation+'</div>'+
      '<button class="gspk" style="margin-top:.4rem;" onclick="speakFr(\''+ws.word+'\')">▶ Escuchar</button>'+
    '</div>';
  }

  var hintH=ws.hint?'<div style="font-size:.7rem;color:rgba(237,233,224,.4);text-align:center;margin-bottom:.5rem;font-style:italic;">Pista: '+ws.hint+'</div>':'';

  var inputH=(!ws.won&&!ws.lost)?
    '<div style="display:flex;gap:.4rem;justify-content:center;margin-top:.5rem;">'+
      '<input class="einp" id="wordleInp" maxlength="'+len+'" placeholder="'+len+' letras..." style="width:'+(len*38)+'px;text-align:center;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;" onkeydown="if(event.key===\'Enter\')submitWordle()">'+
      '<button class="esend" onclick="submitWordle()">→</button>'+
    '</div>'+
    '<div id="wordlestat" class="stat"></div>'+
    '<div style="display:flex;gap:.4rem;justify-content:center;margin-top:.5rem;">'+
      (!ws.hint?'<button class="btn bs" style="font-size:.65rem;" onclick="getWordleHint()">💡 Pista</button>':'')+
    '</div>'
    :'<div class="rbtn" style="margin-top:.6rem;"><button class="btn bgreen" onclick="startWordle()">Nueva palabra</button></div>';

  setSide('Palabra del día','<span style="font-size:.7rem;color:var(--dim);">'+ws.guesses.length+'/'+ws.maxGuesses+' intentos</span>',
    hintH+gridH+legendH+status+inputH,false);

  if(!ws.won&&!ws.lost){
    setTimeout(function(){var inp=document.getElementById('wordleInp');if(inp)inp.focus();},80);
  }
}

async function startWordle(){
  var stat=document.createElement('div');
  setSide('Palabra del día','Cargando...',
    '<div style="text-align:center;padding:2rem;"><span class="spin"></span> Eligiendo palabra...</div>',false);
  try{
    var r=await apiFetch(
      'Elige UNA palabra francesa de entre 4 y 7 letras, común y útil para principiantes. '+
      'SOLO JSON: {"word":"la palabra en minúsculas sin acentos ni caracteres especiales","translation":"traducción al español","hint":"categoría temática vaga (ej: tiempo libre, objetos cotidianos, emociones)"}',
      150);
    wordleState={
      word:(r.word||'merci').toLowerCase().replace(/[^a-z]/g,''),
      translation:r.translation||'',
      hint:null,
      hintText:r.hint||'',
      guesses:[],
      won:false,lost:false,
      maxGuesses:6,
      done:false
    };
    renderExamPanel();
  }catch(e){
    setSide('Palabra del día','Error',
      '<div style="font-size:.75rem;color:rgba(255,120,100,.7);padding:1rem;">'+e.message+'</div>'+
      '<div class="rbtn"><button class="btn bs" onclick="renderExamPanel()">Volver</button></div>',false);
  }
}

function submitWordle(){
  if(!wordleState||wordleState.won||wordleState.lost)return;
  var inp=document.getElementById('wordleInp');if(!inp)return;
  var guess=inp.value.toLowerCase().replace(/[^a-z]/g,'');
  var ws=wordleState;
  if(guess.length!==ws.word.length){
    var st=document.getElementById('wordlestat');
    if(st){st.className='stat r';st.style.display='block';st.textContent='Necesitas '+ws.word.length+' letras';}
    return;
  }
  inp.value='';
  ws.guesses.push(guess);
  if(guess===ws.word){ws.won=true;ws.done=true;}
  else if(ws.guesses.length>=ws.maxGuesses){ws.lost=true;ws.done=true;}
  renderExamPanel();
}

function getWordleHint(){
  if(!wordleState)return;
  wordleState.hint=wordleState.hintText||'sin pista disponible';
  renderExamPanel();
}

  'export default {',
  '  async fetch(req) {',
  '    const c = {"Access-Control-Allow-Origin":"*","Access-Control-Allow-Headers":"content-type,x-api-key"};',
  '    if (req.method==="OPTIONS") return new Response(null,{headers:c});',
  '    const r = await fetch("https://api.anthropic.com/v1/messages", {',
  '      method:"POST",',
  '      headers:{"content-type":"application/json","x-api-key":req.headers.get("x-api-key"),"anthropic-version":"2023-06-01"},',
  '      body: await req.text()',
  '    });',
  '    return new Response(await r.text(),{status:r.status,headers:{...c,"content-type":"application/json"}});',

].join('\n');

// ══ API HELPER ══
// Llama a Anthropic a través de un Cloudflare Worker propio del usuario.
// El Worker URL se guarda junto con la API key.
async function _doFetch(prompt, maxTok){
  var key = getApiKey();
  if (!key) {
    return new Promise(function(res,rej){
      promptApiKey(function(){_doFetch(prompt,maxTok).then(res).catch(rej);});
    });
  }

  var body = JSON.stringify({
    model: 'claude-haiku-4-5-20251001',
    max_tokens: maxTok || 500,
    messages: [{role:'user', content:prompt}]
  });

  var proxyUrl = getWorkerUrl();
  var url, headers;

  if (proxyUrl) {
    // Proxy configurado (Cloudflare Worker u otro) — sin CORS
    url = proxyUrl;
    headers = {
      'content-type':'application/json',
      'x-api-key': key
    };
  } else {
    // Sin proxy: intento directo (solo funciona en claude.ai)
    url = 'https://api.anthropic.com/v1/messages';
    headers = {
      'content-type':'application/json',
      'x-api-key': key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    };
  }

  var resp = await fetch(url, {method:'POST', headers:headers, body:body});

  if (resp.status===401||resp.status===403) {
    _apiKey=''; localStorage.removeItem('nfp_apikey');
    var errBody = await resp.text().catch(function(){return '';});
    throw new Error('API key incorrecta o falta el proxy. Respuesta: '+errBody.substring(0,300));
  }
  if (!resp.ok) {
    var err = await resp.text().catch(function(){return '';});
    throw new Error('HTTP '+resp.status+': '+err.substring(0,300));
  }
  return resp.json();
}

async function apiFetch(prompt, maxTok){
  var data = await _doFetch(prompt, maxTok);
  var text = (data.content||[]).map(function(c){return c.text||'';}).join('');
  text = text.replace(/```json|```/g,'').trim();
  return JSON.parse(text);
}

async function apiFetchRaw(prompt, maxTok){
  var data = await _doFetch(prompt, maxTok);
  return (data.content||[]).map(function(c){return c.text||'';}).join('');
}

// Guardamos: conversaciones añadidas por el usuario, palabras añadidas,
// listas de vocab nuevas, verbos añadidos, y preguntas.
// Los datos BASE del archivo nunca se tocan — solo guardamos los cambios del usuario.

var BASE_CLOUDS_LEN = CLOUDS.length;   // 10 originales
var BASE_VOCAB_LEN  = VOCAB.length;    // 3 listas originales
var BASE_VERBS_LEN  = VERBS.length;    // 9 verbos originales

    '</div></div>'

function saveAll(){
  try{
    // Guarda el estado COMPLETO de todas las conversaciones (títulos + exchanges)
    var allClouds = CLOUDS.map(function(c){
      return {title:c.title, sub:c.sub, exchanges:c.exchanges};
    });
    // Palabras completas de todas las listas
    var allVocab = VOCAB.map(function(g){return {title:g.title, words:g.words.slice()};});
    // Verbos nuevos
    var extraVerbs = VERBS.slice(BASE_VERBS_LEN);
    var data = {
      v:2,
      allClouds: allClouds,
      allVocab: allVocab,
      extraVerbs: extraVerbs,
      qaLog: qaLog
    };
    localStorage.setItem('nfp_data', JSON.stringify(data));
  }catch(e){console.warn('No se pudo guardar:',e);}
}

function loadAll(){
  try{
    var raw = localStorage.getItem('nfp_data');
    if(!raw)return;
    var data = JSON.parse(raw);

    if(data.v===2){
      // Formato nuevo: estado completo
      if(data.allClouds){
        // Restaurar conversaciones originales modificadas
        data.allClouds.slice(0,BASE_CLOUDS_LEN).forEach(function(c,i){
          if(c.title)CLOUDS[i].title=c.title;
          if(c.sub)CLOUDS[i].sub=c.sub;
          if(c.exchanges&&c.exchanges.length)CLOUDS[i].exchanges=c.exchanges;
        });
        // Añadir conversaciones extra
        data.allClouds.slice(BASE_CLOUDS_LEN).forEach(function(c){CLOUDS.push(c);});
      }
      if(data.allVocab){
        data.allVocab.slice(0,BASE_VOCAB_LEN).forEach(function(g,i){
          if(g.title)VOCAB[i].title=g.title;
          if(g.words){
            var existing=VOCAB[i].words.map(function(w){return w.fr;});
            g.words.forEach(function(w){if(existing.indexOf(w.fr)<0)VOCAB[i].words.push(w);});
          }
        });
        data.allVocab.slice(BASE_VOCAB_LEN).forEach(function(g){VOCAB.push(g);});
      }
    } else {
      // Formato viejo (v1) — compatibilidad
      if(data.cloudTitles){
        data.cloudTitles.forEach(function(t,i){if(i<BASE_CLOUDS_LEN&&t)CLOUDS[i].title=t;});
      }
      if(data.extraClouds&&data.extraClouds.length){
        data.extraClouds.forEach(function(c){CLOUDS.push(c);});
      }
      if(data.vocabTitles){
        data.vocabTitles.forEach(function(t,i){if(i<BASE_VOCAB_LEN&&t)VOCAB[i].title=t;});
      }
      if(data.vocabExtra){
        data.vocabExtra.forEach(function(words,i){
          if(i<BASE_VOCAB_LEN&&words&&words.length){
            var existing=VOCAB[i].words.map(function(w){return w.fr;});
            words.forEach(function(w){if(existing.indexOf(w.fr)<0)VOCAB[i].words.push(w);});
          }
        });
      }
      if(data.extraVocab&&data.extraVocab.length){
        data.extraVocab.forEach(function(g){VOCAB.push(g);});
      }
    }

    if(data.extraVerbs&&data.extraVerbs.length){
      data.extraVerbs.forEach(function(v){VERBS.push(v);});
    }
    if(data.qaLog&&data.qaLog.length){qaLog=data.qaLog;}
  }catch(e){console.warn('No se pudo cargar:',e);}
}
